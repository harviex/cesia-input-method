# Rime schema
schema:
  schema_id: pinyin
  name: 拼音
  version: "1.1.1"
  author:
    - Cesia
  description: |
    拼音输入法 - Cesia 输入法内置
  dependencies:

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    reset: 0
    states: [ 漢字, 简体 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs])h/$1/

translator:
  dictionary: pinyin
  spelling_hints: 5
  always_show_comment: false
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  comment_format:
    - xform/.*//

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
