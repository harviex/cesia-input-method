# Rime schema — Cesia T9 九键拼音
schema:
  schema_id: t9_pinyin
  name: 九键拼音
  version: "1.0.0"
  author:
    - Cesia
  description: |
    T9 九键拼音输入 - 2=abc 3=def 4=ghi 5=jkl 6=mno 7=pqrs 8=tuv 9=wxyz

# 开关
switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, Ａ ]

# 输入引擎
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
  filters:
    - uniquifier

# T9 数字拼写器
speller:
  alphabet: "23456789"
  delimiter: "'"
  max_code_length: 20

# 翻译器 — 数字序列查词（词库第二列为 T9 数字编码）
translator:
  dictionary: t9_pinyin
  spelling_hints: 5
  enable_completion: true
  enable_sentence: true
  enable_user_dict: false
  comment_format:
    - xform/.*//

# 标点
punctuator:
  half_shape:
    "," : { commit: "," }
    "." : { commit: "." }
    "?" : { commit: "?" }
    "!" : { commit: "!" }

# 翻页
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }

recognizer:
  patterns:
    t9: "^[2-9]+$"
