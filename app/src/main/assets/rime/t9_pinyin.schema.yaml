# Rime schema — Cesia T9 九键拼音
# 基于雾凇词库（pinyin.dict.yaml），通过 speller.algebra derive 规则将字母映射到数字
# 用户按 T9 数字键 → speller 通过 derive 反推到字母 → script_translator 查词库
schema:
  schema_id: t9_pinyin
  name: 九键拼音
  version: "1.0.0"
  author:
    - Cesia
  description: |
    T9 九键拼音输入 - 2=abc 3=def 4=ghi 5=jkl 6=mno 7=pqrs 8=tuv 9=wxyz
    支持词组和语言模型，基于雾凇词库

# 开关
switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, Ａ ]
  - name: traditional
    reset: 0
    states: [ 简, 繁 ]

# 输入引擎
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier
    - simplifier@traditional

# OpenCC 简繁转换
traditional:
  opencc_config: s2t.json
  option_name: traditional
  show_in_popup_menu: true
  tips: all

# T9 数字拼写器
speller:
  alphabet: "23456789"
  delimiter: "'"
  max_code_length: 20
  algebra:
    # ===== 超级简拼（取首字母出词）=====
    - erase/^hm$/
    - erase/^m$/
    - erase/^n$/
    - erase/^ng$/
    - abbrev/^([a-z]).+$/$1/            # 超级简拼：nj → 南京/年纪
    - abbrev/^([zcs]h).+$/$1/          # zh/ch/sh 视为整体：ch'sh → 城市

    # ===== u / v(ü) 转换 =====
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])v/$1u/

    # ===== 自动纠错（T9 邻键误触，全量）=====
    - derive/([zcs])h(a|e|i|u|ai|ei|an|en|ou|uo|ua|un|ui|uan|uai|uang|ang|eng|ong)$/h$1$2/  # hzi → zhi
    - derive/([zcs])h([aeiu])$/$1$2h/  # zih → zhi
    - derive/([wghk])ai$/$1ia/         # wia → wai
    - derive/([wfghkz])ei$/$1ie/        # wie → wei
    - derive/([jqx])ie$/$1ei/           # jei → jie
    - derive/([rtypsdghklzcbnm])ao$/$1oa/
    - derive/([ypfm])ou$/$1uo/
    - derive/([wrtypsdfghklzcbnm])ang$/$1nag/
    - derive/([wrtypsdfghklzcbnm])ang$/$1agn/
    - derive/([wrtypsdfghklzcbnm])eng$/$1neg/
    - derive/([wrtypsdfghklzcbnm])eng$/$1egn/
    - derive/([qtypdjlxbnm])ing$/$1nig/
    - derive/([qtypdjlxbnm])ing$/$1ign/
    - derive/([qjlxn])iang$/$1aing/
    - derive/([qjlxn])iang$/$1inag/
    - derive/([rtysdghklzxc])uan$/$1aun/
    - derive/([nlyjqx])ue$/$1eu/
    - derive/([rtsdghkzc])o(u|ng)$/$1o/
    - derive/([qwrtypsdfghjklzxcbnm])([aeio])ng$/$1ng/
    - derive/([tl])eng$/$1en/
    - derive/([qwrtypsdfghjklzxcbnm])([aeio])ng$/$1ng/

    # ===== 模糊音（双向 derive，可能扩大候选）=====
    - derive/^l/n/                      # l/n 不分（南方口音）
    - derive/^n/l/
    - derive/^f/h/                      # f/h 不分
    - derive/^h/f/
    - derive/^an/ang/                   # 前后鼻音
    - derive/^ang/an/
    - derive/^en/eng/
    - derive/^eng/en/
    - derive/^in/ing/
    - derive/^ing/in/

    # ===== 字母 → T9 数字映射（核心，置于末尾）=====
    - derive/[abc]/2/
    - derive/[def]/3/
    - derive/[ghi]/4/
    - derive/[jkl]/5/
    - derive/[mno]/6/
    - derive/[pqrs]/7/
    - derive/[tuv]/8/
    - derive/[wxyz]/9/

# 翻译器 — script_translator 支持拼音切分、词组
translator:
  dictionary: rime_ice
  spelling_hints: 5
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  # 限制同音/补全候选总数（简拼单键会爆几百候选，限 60 缓解卡顿）
  max_homophones: 60
  comment_format:
    - xform/.*//

# 标点
punctuator:
  half_shape:
    "," : { commit: "," }
    "." : { commit: "." }
    "?" : { commit: "?" }
    "!" : { commit: "!" }

# 翻页
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }

recognizer:
  patterns:
    t9: "^[2-9]+$"
