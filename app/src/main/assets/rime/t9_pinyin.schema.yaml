# Rime schema — Cesia T9 九键拼音
# 基于雾凇词库（pinyin.dict.yaml），通过 speller.algebra derive 规则将字母映射到数字
# 用户按 T9 数字键 → speller 通过 derive 反推到字母 → script_translator 查词库
schema:
  schema_id: t9_pinyin
  name: 九键拼音
  version: "1.0.0"
  author:
    - Cesia
  description: |
    T9 九键拼音输入 - 2=abc 3=def 4=ghi 5=jkl 6=mno 7=pqrs 8=tuv 9=wxyz
    支持词组和语言模型，基于雾凇词库

# 开关
switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, Ａ ]
  - name: traditional
    reset: 0
    states: [ 简, 繁 ]

# 输入引擎
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier
    - simplifier@traditional

# OpenCC 简繁转换
traditional:
  opencc_config: s2t.json
  option_name: traditional
  show_in_popup_menu: true
  tips: all

# T9 数字拼写器
speller:
  alphabet: "23456789"
  delimiter: "'"
  max_code_length: 20
  algebra:
    # 字母 → T9 数字映射（核心：让 Rime 能把数字匹配到对应字母的拼音）
    - derive/[abc]/2/
    - derive/[def]/3/
    - derive/[ghi]/4/
    - derive/[jkl]/5/
    - derive/[mno]/6/
    - derive/[pqrs]/7/
    - derive/[tuv]/8/
    - derive/[wxyz]/9/

# 翻译器 — script_translator 支持拼音切分、词组
translator:
  dictionary: rime_ice
  spelling_hints: 5
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  comment_format:
    - xform/.*//

# 标点
punctuator:
  half_shape:
    "," : { commit: "," }
    "." : { commit: "." }
    "?" : { commit: "?" }
    "!" : { commit: "!" }

# 翻页
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }

recognizer:
  patterns:
    t9: "^[2-9]+$"
