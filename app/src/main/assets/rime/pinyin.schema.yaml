# Rime schema — Cesia输入法 简化版
schema:
  schema_id: pinyin
  name: 拼音
  version: "1.1.1"
  author:
    - Cesia
  description: |
    雾凇拼音精简版 - Cesia输入法内置
    Based on rime-ice (iDvel/rime-ice)

# 开关
switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, Ａ ]
  - name: ascii_punct
    states: [ ¥, $ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    reset: 0
    states: [ 漢字, 簡体 ]

# 输入引擎
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier
    - simplifier

# 简繁转换内置 filter（使用 Rime 内置简繁转换，无需外部 opencc 文件）
simplifier:
  opencc_config: s2t.json
  tips: all
  show_in_popup_menu: true

# 拼音拼写器
speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    # ===== 简拼 =====
    - abbrev/^([a-z]).+$/$1/           # 单字母简拼：nm→n, sh→s
    - abbrev/^([zcs]h).+$/$1/          # 双字母简拼：zh→z, ch→c, sh→s

    # ===== 平翘舌模糊 =====
    - derive/^([zcs])h/$1/             # zh→z, ch→c, sh→s
    - derive/^([zcs])([^h])/$1h$2/     # z→zh, c→ch, s→sh

    # ===== 前后鼻音模糊 =====
    - derive/([aeiou])n$/$1ng/         # an→ang, en→eng, in→ing...
    - derive/([aeiou])ng$/$1n/         # ang→an, eng→en, ing→in...

    # ===== 韵母顺序模糊 =====
    - derive/uei$/ui/                  # uei↔ui
    - derive/ui$/uei/
    - derive/iou$/iu/                  # iou↔iu
    - derive/iu$/iou/

    # ===== 常用纠错 =====
    - derive/^([nl])ve$/$1ue/correction  # lve→lue, nve→nue
    - derive/^([jqxy])u/$1v/correction   # ju→jv, qu→qv...
    - derive/un$/uen/correction          # un↔uen
    - derive/ong$/on/correction           # ong↔on
    - derive/ao$/oa/correction            # ao↔oa
    - derive/([dtngkhrzcs])o(u|ng)$/$1o/correction  # don→dong 等
    - derive/([iu])a(o|ng?)$/a$1$2/correction       # ian↔iang 等

# 翻译器
translator:
  dictionary: pinyin
  spelling_hints: 5
  always_show_comment: false
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  comment_format:
    - xform/.*//

# 标点符号
punctuator:
  full_shape:
    " " : { commit: "　" }
    "," : { commit: "，" }
    "." : { commit: "。" }
    "<" : { commit: "《" }
    ">" : { commit: "》" }
    "/" : { commit: "／" }
    "?" : { commit: "？" }
    ";" : { commit: "；" }
    ":" : { commit: "：" }
    "'" : { pair: [ "「", "」" ] }
    "\"" : { pair: [ "『", "』" ] }
    "\\" : { commit: "、" }
    "|" : { commit: "｜" }
    "`" : { commit: "·" }
    "~" : { commit: "～" }
    "!" : { commit: "！" }
    "@" : { commit: "＠" }
    "#" : { commit: "＃" }
    "$" : { commit: "＄" }
    "%" : { commit: "％" }
    "^" : { commit: "＾" }
    "&" : { commit: "＆" }
    "*" : { commit: "＊" }
    "(" : { commit: "（" }
    ")" : { commit: "）" }
    "_" : { commit: "＿" }
    "+" : { commit: "＋" }
  half_shape:
    "," : { commit: "," }
    "." : { commit: "." }
    "<" : { commit: "<" }
    ">" : { commit: ">" }
    "/" : { commit: "/" }
    "?" : { commit: "?" }
    ";" : { commit: ";" }
    ":" : { commit: ":" }
    "'" : { commit: "'" }
    "\"" : { commit: "\"" }
    "\\" : { commit: "\\" }
    "|" : { commit: "|" }
    "`" : { commit: "`" }
    "~" : { commit: "~" }
    "!" : { commit: "!" }
    "@" : { commit: "@" }
    "#" : { commit: "#" }
    "$" : { commit: "$" }
    "%" : { commit: "%" }
    "^" : { commit: "^" }
    "&" : { commit: "&" }
    "*" : { commit: "*" }
    "(" : { commit: "(" }
    ")" : { commit: ")" }
    "_" : { commit: "_" }
    "+" : { commit: "+" }
    "-" : { commit: "-" }
    "=" : { commit: "=" }
    "[" : { commit: "[" }
    "]" : { commit: "]" }
    "{" : { commit: "{" }
    "}" : { commit: "}" }

# 快捷键
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }

# 候选触发
recognizer:
  patterns: {}
