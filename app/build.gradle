// build.gradle (app level)
plugins {
    id 'com.android.application' version '8.1.0'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
}

// === 版本号：强制从 APK_VERSION 环境变量读取，CI workflow 中设置 ===
// 去掉本地 git 计数和 fallback，遭遇空值直接报错，防止 build 出 1.1.1 的假象
def getVersionCode() {
    def envVer = System.getenv("APK_VERSION")
    if (envVer == null || envVer.trim().isEmpty()) {
        throw new GradleException("APK_VERSION 环境变量未设置。CI workflow 应在 build 前设置 APK_VERSION=1.1.N")
    }
    def parts = envVer.split("\\.")
    if (parts.length < 3) {
        throw new GradleException("APK_VERSION 格式错误: '${envVer}'，应为 x.y.z")
    }
    return parts[2].toInteger()
}

def getVersionName() {
    def envVer = System.getenv("APK_VERSION")
    if (envVer == null || envVer.trim().isEmpty()) {
        throw new GradleException("APK_VERSION 环境变量未设置。CI workflow 应在 build 前设置 APK_VERSION=1.1.N")
    }
    return envVer
}

android {
    namespace 'com.cesia.input'
    compileSdk 34

    defaultConfig {
        applicationId "com.cesia.input"
        minSdk 24
        targetSdk 34
        versionCode getVersionCode()
        versionName getVersionName()
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    // 签名配置
    signingConfigs {
        debug {
            storeFile file("/tmp/cesia-debug.keystore")
            storePassword "cesiacesia"
            keyAlias "cesiadebug"
            keyPassword "cesiacesia"
        }
        release {
            storeFile file("cesia-release.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "cesia2026"
            keyAlias "cesia"
            keyPassword System.getenv("KEY_PASSWORD") ?: "cesia2026"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    
    // 移除externalNativeBuild - WeNet库自带native代码
    
    buildFeatures {
        viewBinding true
        buildConfig true
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation project(':rime-engine')

    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // OkHttp for HTTP
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // Gson for JSON
    implementation 'com.google.code.gson:gson:2.10.1'

    // Coroutines for async
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
}

// 注释掉编译时下载，改为运行时下载（已在WenetManager.kt中实现）
// WeNet模型将在应用首次运行时自动下载

// === APK 重命名：使用 versionName 命名输出 APK ===
// 注意：AGP 8.x 已移除 variant.outputs[].outputFileName API
// 用 assembleDebug finalizedBy 复制的方式实现精确命名
def cesiaApkName = "Cesia-${versionName ?: '1.1.1'}-debug.apk"
tasks.register("renameDebugApk") {
    def apkDir = file("$buildDir/outputs/apk/debug/")
    def apkFile = apkDir.listFiles().find { f ->
        f.name.endsWith('.apk') && f.name.contains('debug') && !f.name.startsWith('Cesia-')
    }
    if (apkFile) {
        inputs.file(apkFile)
        outputs.file("$apkDir/$cesiaApkName")
        doLast {
            apkFile.renameTo(file("$apkDir/$cesiaApkName"))
        }
    }
}
tasks.named("assembleDebug").configure { finalizedBy "renameDebugApk" }
