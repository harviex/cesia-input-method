// build.gradle (app level)
plugins {
    id 'com.android.application' version '8.1.0'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
}

// === 动态读取版本号 ===
// === 版本号：优先从环境变量读取（CI构建时由workflow传入），本地开发时从git计算 ===
def getVersionCode() {
    def envVersion = System.getenv("APK_VERSION")
    if (envVersion != null && !envVersion.isEmpty()) {
        // 从 "1.1.344" 提取最后一段数字
        def parts = envVersion.split("\\.")
        return parts.length >= 3 ? (parts[2].toInteger()) : 1
    }
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
            workingDir = rootDir
        }
        def count = Integer.parseInt(stdout.toString().trim())
        return count > 0 ? count : 1
    } catch (Exception e) {
        return 1
    }
}

def getVersionName() {
    def envVersion = System.getenv("APK_VERSION")
    if (envVersion != null && !envVersion.isEmpty()) {
        return envVersion
    }
    return "1.1." + getVersionCode()
}

android {
    namespace 'com.cesia.input'
    compileSdk 34

    defaultConfig {
        applicationId "com.cesia.input"
        minSdk 24
        targetSdk 34
        versionCode getVersionCode()
        versionName getVersionName()
        buildConfigField "String", "VERSION_NAME", "\"${getVersionName()}\""
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    // 签名配置
    signingConfigs {
        debug {
            storeFile file("/tmp/cesia-debug.keystore")
            storePassword "cesiacesia"
            keyAlias "cesiadebug"
            keyPassword "cesiacesia"
        }
        release {
            storeFile file("cesia-release.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "cesia2026"
            keyAlias "cesia"
            keyPassword System.getenv("KEY_PASSWORD") ?: "cesia2026"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    
    // APK 输出文件名：cesia-input-1.1.XXX.apk
    android.applicationVariants.all { variant ->
        variant.outputs.all {
            def vn = getVersionName()
            if (vn == null || vn.isEmpty() || vn == "null") {
                vn = "1.1.0"
            }
            outputFileName = "cesia-input-${vn}.apk"
            println "📦 APK output: ${outputFileName}"
        }
    }

    // 移除externalNativeBuild - WeNet库自带native代码
    
    buildFeatures {
        viewBinding true
        buildConfig true
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation project(':rime-engine')

    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // OkHttp for HTTP
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // Gson for JSON
    implementation 'com.google.code.gson:gson:2.10.1'

    // Coroutines for async
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
}

// 注释掉编译时下载，改为运行时下载（已在WenetManager.kt中实现）
// WeNet模型将在应用首次运行时自动下载
