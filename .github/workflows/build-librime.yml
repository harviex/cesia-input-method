# 编译 librime_jni.so for Android
# 简化版：手动 clone 所有依赖，跳过有问题的 submodule

name: Build librime.so

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            target_api: aarch64-linux-android21
          - arch: armeabi-v7a
            target_api: armv7a-linux-androideabi21
          - arch: x86_64
            target_api: x86_64-linux-android21
          - arch: x86
            target_api: i686-linux-android21

    env:
      NDK_VERSION: 25.2.9519653

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android NDK
        run: |
          set -e
          export JAVA_HOME=$JAVA_HOME_17_X64
          export SDK_ROOT=${{ github.workspace }}/android-sdk
          mkdir -p $SDK_ROOT

          # 下载 cmdline-tools
          if [ ! -d "$SDK_ROOT/cmdline-tools/latest" ]; then
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdtools.zip
            mkdir -p $SDK_ROOT/cmdline-tools
            unzip -q /tmp/cmdtools.zip -d /tmp/
            mv /tmp/cmdline-tools $SDK_ROOT/cmdline-tools/latest
            rm -f /tmp/cmdtools.zip
          fi

          export PATH=$JAVA_HOME/bin:$SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}" > /dev/null 2>&1

          echo "NDK_HOME=$SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          ls $SDK_ROOT/ndk/${{ env.NDK_VERSION }}/

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build pkg-config

      - name: Clone all sources manually
        run: |
          set -e
          SRC=${{ github.workspace }}/src
          mkdir -p $SRC && cd $SRC

          # librime
          if [ ! -d "librime" ]; then
            git clone --depth=1 https://github.com/rime/librime.git
          fi

          # 手动 clone 每个依赖（不用 submodule）
          DEPS="$SRC/librime/deps"
          mkdir -p $DEPS

          declare -A REPOS=(
            ["glog"]="https://github.com/google/glog.git"
            ["leveldb"]="https://github.com/google/leveldb.git"
            ["yaml-cpp"]="https://github.com/jbeder/yaml-cpp.git"
            ["marisa-trie"]="https://github.com/s-yata/marisa-trie.git"
            ["snappy"]="https://github.com/google/snappy.git"
            ["opencc"]="https://github.com/BYVoid/OpenCC.git"
          )

          for dep in "${!REPOS[@]}"; do
            if [ ! -d "$DEPS/$dep" ]; then
              echo "Cloning $dep..."
              git clone --depth=1 "${REPOS[$dep]}" "$DEPS/$dep" 2>&1 | tail -2
            else
              echo "$dep already exists"
            fi
          done

          echo "=== All deps ==="
          ls -la $DEPS/

      - name: Setup toolchain
        run: |
          NDK="${{ env.NDK_HOME }}"
          TC="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          ARCH="${{ matrix.arch }}"
          INSTALL="${{ github.workspace }}/install/$ARCH"
          BLD="${{ github.workspace }}/build/$ARCH"
          mkdir -p $INSTALL $BLD

          echo "TC=$TC" >> $GITHUB_ENV
          echo "CC=$TC/bin/${{ matrix.target_api }}-clang" >> $GITHUB_ENV
          echo "CXX=$TC/bin/${{ matrix.target_api }}-clang++" >> $GITHUB_ENV
          echo "AR=$TC/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TC/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TC/bin/llvm-strip" >> $GITHUB_ENV
          echo "INSTALL=$INSTALL" >> $GITHUB_ENV
          echo "BLD=$BLD" >> $GITHUB_ENV
          echo "CMAKE_FLAGS=-DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake -DANDROID_ABI=$ARCH -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -GNinja" >> $GITHUB_ENV

      - name: Build Boost (cross-compile)
        timeout-minutes: 40
        run: |
          set -e
          ARCH="${{ matrix.arch }}"
          VER="1.84.0"
          DIR="boost_${VER//./_}"
          SRC="${{ github.workspace }}/src"
          BLD="${{ github.workspace }}/build/$ARCH"
          INSTALL="${{ github.workspace }}/install/$ARCH"
          NDK="${{ env.NDK_HOME }}"
          TC="$NDK/toolchains/llvm/prebuilt/linux-x86_64"

          mkdir -p $SRC/boost && cd $SRC/boost

          if [ ! -f "$DIR/bootstrap.sh" ]; then
            echo "Downloading Boost $VER..."
            curl -L --connect-timeout 30 -o boost.tar.gz "https://archives.boost.io/release/$VER/source/$DIR.tar.gz"
            tar xzf boost.tar.gz
            rm boost.tar.gz
          fi

          cd $DIR

          # 写 user-config.jam（用绝对路径）
          cat > user-config.jam << EOF
          using clang : android :
            $TC/bin/${{ matrix.target_api }}-clang++ :
            <archiver>$TC/bin/llvm-ar
            <ranlib>$TC/bin/llvm-ranlib
            <compileflags>-fPIC
            <compileflags>-DANDROID
            <compileflags>-D__ANDROID_API__=21
            <compileflags>-std=c++17
          ;
          EOF

          echo "=== user-config.jam ==="
          cat user-config.jam

          ./bootstrap.sh --with-toolset=clang 2>&1 | tail -3

          ./b2 toolset=clang-android \
            --with-filesystem --with-system --with-regex --with-thread \
            --with-date_time --with-locale --with-iostreams --with-program_options \
            --build-dir=$BLD/boost \
            --prefix=$INSTALL \
            variant=release link=static threading=multi \
            runtime-link=static \
            target-os=android abi=aapcs \
            -j$(nproc) \
            install 2>&1 | tail -30

          echo "=== Boost libs ==="
          ls $INSTALL/lib/libboost_*.a 2>/dev/null | head -10 || echo "WARNING: No Boost libs"

      - name: Build snappy
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/snappy && cd $B/snappy
          cmake $SRC/librime/deps/snappy $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I \
            -DSNAPPY_BUILD_TESTS=OFF -DSNAPPY_BUILD_BENCHMARKS=OFF
          ninja -j$(nproc) && ninja install

      - name: Build leveldb
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/leveldb && cd $B/leveldb
          cmake $SRC/librime/deps/leveldb $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I \
            -DLEVELDB_BUILD_TESTS=OFF -DLEVELDB_BUILD_BENCHMARKS=OFF \
            -DHAVE_SNAPPY=ON
          ninja -j$(nproc) && ninja install

      - name: Build marisa-trie
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/marisa && cd $B/marisa
          cmake $SRC/librime/deps/marisa-trie $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I
          ninja -j$(nproc) && ninja install

      - name: Build glog
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/glog && cd $B/glog
          cmake $SRC/librime/deps/glog $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I \
            -DWITH_GFLAGS=OFF -DWITH_GTEST=OFF -DWITH_UNWIND=OFF \
            -DCMAKE_C_FLAGS="-ffile-prefix-map=$SRC=." \
            -DCMAKE_CXX_FLAGS="-ffile-prefix-map=$SRC=."
          ninja -j$(nproc) && ninja install

      - name: Build yaml-cpp
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/yaml-cpp && cd $B/yaml-cpp
          cmake $SRC/librime/deps/yaml-cpp $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I \
            -DYAML_CPP_BUILD_TOOLS=OFF -DYAML_CPP_BUILD_TESTS=OFF -DYAML_CPP_INSTALL=OFF
          ninja -j$(nproc) && ninja install

      - name: Build OpenCC
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/opencc && cd $B/opencc
          cmake $SRC/librime/deps/opencc $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I \
            -DCMAKE_INSTALL_LIBDIR=lib
          ninja -j$(nproc) && ninja install

      - name: Build librime (static)
        timeout-minutes: 15
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          mkdir -p $B/librime && cd $B/librime
          cmake $SRC/librime $CMAKE_FLAGS \
            -DCMAKE_INSTALL_PREFIX=$I \
            -DBUILD_TESTING=OFF -DENABLE_LOGGING=OFF \
            -DCMAKE_C_FLAGS="-I$I/include -ffile-prefix-map=$SRC=." \
            -DCMAKE_CXX_FLAGS="-I$I/include -ffile-prefix-map=$SRC=." \
            -DBOOST_ROOT=$I \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=ON \
            -DOpencc_LIBRARY=$I/lib/libopencc.a \
            -DOpencc_INCLUDE_PATH=$I/include
          ninja -j$(nproc) 2>&1 | tail -20
          ninja install

      - name: Build rime_jni (shared .so)
        timeout-minutes: 10
        run: |
          set -e
          SRC="${{ github.workspace }}/src"
          B="${{ github.workspace }}/build/${{ matrix.arch }}"
          I="${{ github.workspace }}/install/${{ matrix.arch }}"
          JNISRC="$GITHUB_WORKSPACE/app/src/main/jni/librime_jni"
          mkdir -p $B/rime_jni && cd $B/rime_jni

          cmake $JNISRC \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.NDK_HOME }}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.arch }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX=$I \
            -Drime_DIR=$I/lib/cmake/rime \
            -DOpencc_LIBRARY=$I/lib/libopencc.a \
            -DOpencc_INCLUDE_PATH=$I/include \
            -DCMAKE_C_FLAGS="-I$I/include -I$SRC/librime/include" \
            -DCMAKE_CXX_FLAGS="-I$I/include -I$SRC/librime/include" \
            -GNinja

          ninja -j$(nproc) VERBOSE=1 2>&1 | tail -40

          echo "=== Output .so files ==="
          find $B/rime_jni -name "*.so" -exec ls -lh {} \;

      - name: Copy .so to jniLibs
        run: |
          JNILIBS="$GITHUB_WORKSPACE/app/src/main/jniLibs/${{ matrix.arch }}"
          mkdir -p $JNILIBS
          cp ${{ github.workspace }}/build/${{ matrix.arch }}/rime_jni/*.so $JNILIBS/ 2>/dev/null || true
          echo "=== jniLibs ==="
          ls -lh $JNILIBS/ 2>/dev/null || echo "No .so files"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librime-jni-${{ matrix.arch }}
          path: app/src/main/jniLibs/${{ matrix.arch }}/*.so
          if-no-files-found: error
