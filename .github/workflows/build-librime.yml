name: Build Librime

on:
  workflow_dispatch:

jobs:
  build-librime:
    name: Cross-compile librime for Android
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi

    steps:
      - name: Checkout Cesia repo
        uses: actions/checkout@v4
        with:
          path: cesia

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Clone librime and all submodules
        run: |
          git clone --depth 1 https://github.com/rime/librime.git librime-src
          cd librime-src
          git submodule update --init --depth 1

      - name: Build yaml-cpp
        run: |
          cd librime-src/deps/yaml-cpp
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DYAML_CPP_BUILD_TESTS=OFF \
            -DYAML_CPP_BUILD_TOOLS=OFF \
            -DCMAKE_C_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang \
            -DCMAKE_CXX_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang++
          make -j$(nproc)

      - name: Build leveldb
        run: |
          cd librime-src/deps/leveldb
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLEVELDB_BUILD_TESTS=OFF \
            -DLEVELDB_BUILD_BENCHMARKS=OFF \
            -DCMAKE_C_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang \
            -DCMAKE_CXX_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang++
          make -j$(nproc)

      - name: Build marisa
        run: |
          cd librime-src/deps/marisa-trie
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_C_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang \
            -DCMAKE_CXX_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang++
          make -j$(nproc)

      - name: Build opencc (host build for tools, then skip in cross-compile)
        run: |
          cd librime-src/deps/opencc

          # Build host version to get the opencc tool
          rm -rf build-host && mkdir build-host && cd build-host
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DENABLE_DARTS=OFF -DBUILD_PYTHON=OFF
          make -j$(nproc) opencc opencc_dict
          export OPENCC_HOST_BIN=$(pwd)
          echo "Host tools: $(ls $OPENCC_HOST_BIN/opencc $OPENCC_HOST_BIN/opencc_dict 2>/dev/null)"

          # Build cross-compiled version (libraries only, skip tools and data)
          cd ..
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_DARTS=OFF \
            -DBUILD_PYTHON=OFF \
            -DCMAKE_C_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang \
            -DCMAKE_CXX_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang++ \
            -Dopencc_HOST_BINARY_DIR=$OPENCC_HOST_BIN
          # Build only the library, skip tools and data generation
          make -j$(nproc) opencc_static 2>&1 || make -j$(nproc) 2>&1 || echo "OpenCC build may have issues, continuing..."

      - name: Build librime-static
        run: |
          cd librime-src
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC=ON \
            -DBUILD_TEST=OFF \
            -DENABLE_LOGGING=OFF \
            -DCMAKE_C_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang \
            -DCMAKE_CXX_COMPILER=${{ env.NDK_ROOT }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.target }}24-clang++ \
            -Dyaml-cpp_DIR=../deps/yaml-cpp/build \
            -Dleveldb_DIR=../deps/leveldb/build \
            -Dopencc_DIR=../deps/opencc/build \
            -DCMAKE_DISABLE_FIND_PACKAGE_OpenCC=OFF
          make -j$(nproc) 2>&1 | tail -20
          echo "=== Checking for librime.a ==="
          find . -name "*.a" -type f

      - name: Copy artifacts to Cesia module
        run: |
          mkdir -p cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}
          find librime-src/build -name "librime.a" -exec cp {} cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}/ \;
          mkdir -p cesia/rime-engine/src/main/cpp/include
          cp librime-src/src/rime_api.h cesia/rime-engine/src/main/cpp/include/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-${{ matrix.abi }}
          path: |
            cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}/*.a
            cesia/rime-engine/src/main/cpp/include/*.h
          retention-days: 7

  commit-libraries:
    name: Commit librime to repo
    needs: build-librime
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Cesia repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: cesia

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: librime-*
          path: artifacts
          merge-multiple: false

      - name: Merge into rime-engine
        run: |
          for abi_dir in artifacts/librime-*/; do
            abi=$(basename "$abi_dir" | sed 's/librime-//')
            mkdir -p cesia/rime-engine/src/main/jniLibs/$abi
            cp "$abi_dir"/*.a cesia/rime-engine/src/main/jniLibs/$abi/
          done
          mkdir -p cesia/rime-engine/src/main/cpp/include
          cp artifacts/librime-arm64-v8a/include/*.h cesia/rime-engine/src/main/cpp/include/

      - name: Commit and push
        working-directory: cesia
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rime-engine/src/main/jniLibs/ rime-engine/src/main/cpp/include/
          git commit -m "build: add precompiled librime for Android" || echo "No changes"
          git push || echo "Push failed"