name: Build Librime

on:
  workflow_dispatch:

jobs:
  build-librime:
    name: Cross-compile librime for Android
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi

    steps:
      - name: Checkout Cesia repo
        uses: actions/checkout@v4
        with:
          path: cesia

      - name: Install Android SDK and NDK
        run: |
          # 安装 Android SDK
          export ANDROID_HOME=/opt/android-sdk
          sudo mkdir -p $ANDROID_HOME
          sudo chown $USER:$USER $ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

          # 下载 command line tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          # 安装 NDK
          export ANDROID_HOME=$ANDROID_HOME
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" --no_https 2>&1 | tail -5

          NDK_PATH="$ANDROID_HOME/ndk/25.2.9519653"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_ROOT=$NDK_PATH"
          ls "$NDK_PATH/build/cmake/android.toolchain.cmake"

      - name: Clone librime and all submodules
        run: |
          git clone --depth 1 https://github.com/rime/librime.git librime-src
          cd librime-src
          git submodule update --init --depth 1
          echo "librime source ready"
          ls deps/

      - name: Build all dependencies and librime
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          set -e
          cd librime-src
          DEPS_DIR=$(pwd)/deps

          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export CC=$TOOLCHAIN/bin/${{ matrix.target }}24-clang
          export CXX=$TOOLCHAIN/bin/${{ matrix.target }}24-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib

          CMAKE_ARGS=(
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
            -DANDROID_ABI=${{ matrix.abi }}
            -DANDROID_PLATFORM=android-24
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=OFF
            -DCMAKE_C_COMPILER=$CC
            -DCMAKE_CXX_COMPILER=$CXX
          )

          echo "=== Building yaml-cpp ==="
          cd $DEPS_DIR/yaml-cpp
          rm -rf build && mkdir build && cd build
          cmake .. "${CMAKE_ARGS[@]}" -DYAML_CPP_BUILD_TESTS=OFF -DYAML_CPP_BUILD_TOOLS=OFF
          make -j$(nproc)

          echo "=== Building leveldb ==="
          cd $DEPS_DIR/leveldb
          rm -rf build && mkdir build && cd build
          cmake .. "${CMAKE_ARGS[@]}" -DLEVELDB_BUILD_TESTS=OFF -DLEVELDB_BUILD_BENCHMARKS=OFF
          make -j$(nproc)

          echo "=== Building marisa ==="
          cd $DEPS_DIR/marisa-trie
          rm -rf build && mkdir build && cd build
          cmake .. "${CMAKE_ARGS[@]}"
          make -j$(nproc)

          echo "=== Building opencc ==="
          cd $DEPS_DIR/opencc
          rm -rf build && mkdir build && cd build
          cmake .. "${CMAKE_ARGS[@]}" -DBUILD_SHARED_LIBS=OFF -DENABLE_DARTS=OFF -DBUILD_PYTHON=OFF
          make -j$(nproc)

          echo "=== Building librime ==="
          cd $(pwd)/../..
          rm -rf build && mkdir build && cd build
          cmake .. "${CMAKE_ARGS[@]}" \
            -DBUILD_STATIC=ON \
            -DBUILD_TEST=OFF \
            -DENABLE_LOGGING=OFF \
            -Dyaml-cpp_DIR=$DEPS_DIR/yaml-cpp/build \
            -Dleveldb_DIR=$DEPS_DIR/leveldb/build
          make -j$(nproc)

          echo "=== Build complete ==="
          ls -la *.a

      - name: Copy artifacts to Cesia module
        run: |
          mkdir -p cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}
          cp librime-src/build/librime.a \
             cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}/librime.a
          mkdir -p cesia/rime-engine/src/main/cpp/include
          cp librime-src/src/rime_api.h cesia/rime-engine/src/main/cpp/include/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-${{ matrix.abi }}
          path: |
            cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}/*.a
            cesia/rime-engine/src/main/cpp/include/*.h
          retention-days: 7

  commit-libraries:
    name: Commit librime to repo
    needs: build-librime
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Cesia repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: cesia

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: librime-*
          path: artifacts
          merge-multiple: false

      - name: Merge into rime-engine
        run: |
          for abi_dir in artifacts/librime-*/; do
            abi=$(basename "$abi_dir" | sed 's/librime-//')
            mkdir -p cesia/rime-engine/src/main/jniLibs/$abi
            cp "$abi_dir"/*.a cesia/rime-engine/src/main/jniLibs/$abi/
          done
          mkdir -p cesia/rime-engine/src/main/cpp/include
          cp artifacts/librime-arm64-v8a/include/*.h cesia/rime-engine/src/main/cpp/include/

      - name: Commit and push
        working-directory: cesia
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rime-engine/src/main/jniLibs/ rime-engine/src/main/cpp/include/
          git commit -m "build: add precompiled librime for Android" || echo "No changes"
          git push || echo "Push failed"