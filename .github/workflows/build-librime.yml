name: Build Librime

on:
  workflow_dispatch:
    inputs:
      librime_version:
        description: 'librime version/branch to build'
        required: false
        default: 'master'

jobs:
  build-librime:
    name: Cross-compile librime for Android
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: armeabi-v7a
            target: armv7a-linux-androideabi

    steps:
      - name: Checkout Cesia repo
        uses: actions/checkout@v4
        with:
          path: cesia

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            python3 \
            pkg-config \
            git \
            cmake

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Clone librime and all dependencies
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.librime_version }} \
            https://github.com/rime/librime.git librime-src
          cd librime-src
          git submodule update --init --depth 1

      - name: Build yaml-cpp (static)
        run: |
          cd librime-src/deps/yaml-cpp
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DYAML_CPP_BUILD_TESTS=OFF \
            -DYAML_CPP_BUILD_TOOLS=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -G Ninja
          ninja -j$(nproc)

      - name: Build leveldb (static)
        run: |
          cd librime-src/deps/leveldb
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLEVELDB_BUILD_TESTS=OFF \
            -DLEVELDB_BUILD_BENCHMARKS=OFF \
            -G Ninja
          ninja -j$(nproc)

      - name: Build marisa (static)
        run: |
          cd librime-src/deps/marisa-trie
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -G Ninja
          ninja -j$(nproc)

      - name: Build opencc (static)
        run: |
          cd librime-src/deps/opencc
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -G Ninja
          ninja -j$(nproc)

      - name: Build librime-static
        env:
          NDK_ROOT: ${{ env.NDK_ROOT }}
        run: |
          cd librime-src
          mkdir -p build && cd build

          export TOOLCHAIN=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export CC=$TOOLCHAIN/bin/${{ matrix.target }}21-clang
          export CXX=$TOOLCHAIN/bin/${{ matrix.target }}21-clang++

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC=ON \
            -DBUILD_TEST=OFF \
            -DENABLE_LOGGING=OFF \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -Dyaml-cpp_DIR=../deps/yaml-cpp/build \
            -Dleveldb_DIR=../deps/leveldb/build \
            -G Ninja

          ninja -j$(nproc)

      - name: Copy artifacts
        run: |
          mkdir -p cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}
          cp librime-src/build/librime.a \
             cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}/librime.a
          mkdir -p cesia/rime-engine/src/main/cpp/include
          cp librime-src/src/rime_api.h cesia/rime-engine/src/main/cpp/include/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: librime-${{ matrix.abi }}
          path: |
            cesia/rime-engine/src/main/jniLibs/${{ matrix.abi }}/*.a
            cesia/rime-engine/src/main/cpp/include/*.h
          retention-days: 7

  commit-libraries:
    name: Commit librime to repo
    needs: build-librime
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Cesia repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: cesia

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: librime-*
          path: artifacts
          merge-multiple: false

      - name: Merge into rime-engine
        run: |
          for abi_dir in artifacts/librime-*/; do
            abi=$(basename "$abi_dir" | sed 's/librime-//')
            mkdir -p cesia/rime-engine/src/main/jniLibs/$abi
            cp "$abi_dir"/*.a cesia/rime-engine/src/main/jniLibs/$abi/
          done
          mkdir -p cesia/rime-engine/src/main/cpp/include
          cp artifacts/librime-arm64-v8a/include/*.h cesia/rime-engine/src/main/cpp/include/

      - name: Commit and push
        working-directory: cesia
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rime-engine/src/main/jniLibs/ rime-engine/src/main/cpp/include/
          git commit -m "build: add precompiled librime for Android [arm64-v8a, armeabi-v7a]" || echo "No changes"
          git push || echo "Push failed"