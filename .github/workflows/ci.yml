name: CI - Build & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # 每周一凌晨 3 点全量安全扫描

jobs:
  # ---- Build APK ----
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android NDK
        run: |
          export SDK_ROOT=/usr/local/lib/android/sdk
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" > /dev/null 2>&1
          echo "NDK_HOME=$SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Restore debug keystore
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > /tmp/cesia-debug.keystore
          echo "Keystore restored"

      - name: Determine version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.1.$COUNT"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APK_VERSION=$VERSION" >> $GITHUB_ENV
          echo "apkVersion=$VERSION" > gradle.properties.tmp
          grep -v "^apkVersion=" gradle.properties >> gradle.properties.tmp 2>/dev/null || true
          mv gradle.properties.tmp gradle.properties
          echo "✅ Version: $VERSION (commit count: $COUNT)"

      - name: Build APK with Gradle
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export ANDROID_NDK_HOME=${{ env.NDK_HOME }}
          ./gradlew assembleDebug \
            --no-daemon \
            -PapkVersion=${{ steps.version.outputs.version }} \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cesia-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Cesia v${{ steps.version.outputs.version }}"
          body: |
            Cesia Input Method v${{ steps.version.outputs.version }}

            自动构建版本 — Git commit: ${{ github.sha }}

            **安装**: 下载 APK 直接安装覆盖旧版本，无需卸载重装。

            **变更**:
            ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json on gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const path = 'docs/latest.json';
            const content = JSON.stringify({
              apk_url: `https://github.com/harviex/cesia-input-method/releases/download/v${{ steps.version.outputs.version }}/Cesia-${{ steps.version.outputs.version }}-debug.apk`,
              version: `v${{ steps.version.outputs.version }}`
            });
            const { data: existing } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: 'gh-pages'
            });
            const sha = existing.sha;
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `chore: update latest.json to v${{ steps.version.outputs.version }}`,
              content: Buffer.from(content).toString('base64'),
              sha,
              branch: 'gh-pages'
            });

  # ---- Security Scan (Semgrep) ----
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep (包含自定义输入法规则)
        run: |
          semgrep ci \
            --config=rules/ime-security.yaml \
            --config=rules/ime-bugs.yaml \
            --sarif \
            --sarif-output=semgrep.sarif \
            --no-git-ignore
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep