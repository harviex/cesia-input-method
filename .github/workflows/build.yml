name: Build Cesia APK with Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build with Docker (android-build-box)
      run: |
        # 使用预配置的Android构建镜像
        docker run --rm \
          -v ${{ github.workspace }}:/project \
          -w /project \
          mingc/android-build-box:latest \
          bash -c "
            echo '=== 环境检查 ===' && \
            java -version && \
            echo '=== 构建APK ===' && \
            gradle assembleDebug --no-daemon --stacktrace && \
            echo '=== 构建完成 ===' && \
            ls -lh app/build/outputs/apk/debug/
          "
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cesia-input-method-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Cesia输入法 v${{ github.run_number }}
        body: |
          🎉 Cesia输入法自动构建版本
          
          ## 安装步骤
          1. 下载 cesia-input-method.apk
          2. 安装到手机（允许未知来源）
          3. 设置 → 语言和输入法 → 启用"Cesia输入法"
          4. 后续将添加WeNet语音识别和API润色功能
          
          ## 更新内容
          - 自动构建版本 v${{ github.run_number }}
          - 基本输入法框架（暂未包含语音功能）
        files: app/build/outputs/apk/debug/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
