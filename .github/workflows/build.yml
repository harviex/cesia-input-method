name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: always

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore debug keystore
        run: |
          # 从GitHub Secret恢复固定keystore，确保每次构建签名一致
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > /tmp/cesia-debug.keystore
          echo "Keystore restored"

      - name: Determine version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          if [ "$COUNT" -lt 1 ]; then
            COUNT=1
          fi
          VERSION="1.1.$COUNT"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APK_VERSION=$VERSION" >> $GITHUB_ENV
          # 写入 gradle.properties，确保 Gradle 配置期能读到
          echo "apkVersion=$VERSION" > gradle.properties.tmp
          # 保留原有属性，追加版本号
          grep -v "^apkVersion=" gradle.properties >> gradle.properties.tmp 2>/dev/null || true
          mv gradle.properties.tmp gradle.properties
          echo "✅ Version: $VERSION (commit count: $COUNT)"
          echo "--- gradle.properties ---"
          cat gradle.properties

      - name: Build APK with Gradle
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew assembleDebug --no-daemon -PapkVersion=${{ steps.version.outputs.version }}

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: cesia-input-method-debug
          path: app/build/outputs/apk/debug/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Cesia v${{ steps.version.outputs.version }}"
          body: |
            Cesia Input Method v${{ steps.version.outputs.version }}

            自动构建版本 — Git commit: ${{ github.sha }}

            **安装**: 下载 APK 直接安装覆盖旧版本，无需卸载重装。

            **自动更新**: 输入法设置 → 检查更新 → 自动下载安装

            **变更**:
            ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
