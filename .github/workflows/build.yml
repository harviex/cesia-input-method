name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix gradlew (unescape bug)
        run: |
          # 修复 gradlew 中不兼容的 unescape 命令
          sed -i 's/case ".*unescape.*/case "$(uname -s)"/' gradlew

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools 34
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          chmod +x gradlew
          # 先尝试运行，看看能否成功
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Check Result
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "SUCCESS: APK generated!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "FAILURE: APK not found"
            exit 1
          fi

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cesia-input-method
          path: app/build/outputs/apk/debug/app-debug.apk
