name: Build Cesia APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        log-accept-android-sdk-licenses: true
    
    - name: Accept Android SDK licenses manually
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c7" > $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e305ecf71c9" >> $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n791207223" > $ANDROID_HOME/licenses/intel-android-extra-license
        cat $ANDROID_HOME/licenses/android-sdk-license
        echo "✅ Licenses created"
    
    - name: Verify SDK
      run: |
        ls -la $ANDROID_HOME/
        sdkmanager --list || echo "⚠️ sdkmanager not found, will install"
    
    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/
        echo "PATH=/opt/gradle-8.5/bin:$PATH" >> $GITHUB_ENV
        gradle --version
    
    - name: Clean build
      run: gradle clean --no-daemon || true
    
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --stacktrace --info
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cesia-input-method-debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Cesia输入法 v${{ github.run_number }}
        body: |
          🎉 Cesia输入法自动构建版本
          
          ## 安装步骤
          1. 下载 cesia-input-method.apk
          2. 安装到手机（允许未知来源）
          3. 设置 → 语言和输入法 → 启用"Cesia输入法"
          4. 首次使用会自动下载WeNet模型（~90MB）
          
          ## 更新内容
          - 自动构建版本 v${{ github.run_number }}
          - 基于最新main分支代码
        files: app/build/outputs/apk/debug/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
