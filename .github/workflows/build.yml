name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore debug keystore
        run: |
          # 从GitHub Secret恢复固定keystore，确保每次构建签名一致
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > /tmp/cesia-debug.keystore
          echo "Keystore restored"

      - name: Determine version
        id: version
        run: |
          VERSION="1.1.1"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "✅ Version: $VERSION"

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cesia-input-method-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Cesia v${{ steps.version.outputs.version }}"
          body: |
            Cesia Input Method v${{ steps.version.outputs.version }}

            自动构建版本 — Git commit: ${{ github.sha }}

            **安装**: 下载 APK 直接安装覆盖旧版本，无需卸载重装。

            **自动更新**: 输入法设置 → 检查更新 → 自动下载安装

            **变更**:
            ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
