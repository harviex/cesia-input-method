# Build APK for Android
# MNN .a libraries are downloaded from GitHub Release by CMake

name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android NDK + SDK
        run: |
          export SDK_ROOT=${{ github.workspace }}/android-sdk
          mkdir -p $SDK_ROOT
          if [ ! -d "$SDK_ROOT/cmdline-tools/latest" ]; then
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -o /tmp/cmdtools.zip
            mkdir -p $SDK_ROOT/cmdline-tools
            unzip -q /tmp/cmdtools.zip -d /tmp/
            mv /tmp/cmdline-tools $SDK_ROOT/cmdline-tools/latest
          fi
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "platforms;android-34" > /dev/null 2>&1
          sdkmanager --install "ndk;25.2.9519653" > /dev/null 2>&1
          echo "NDK_HOME=$SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV

      - name: Build APK with Gradle
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export ANDROID_HOME=${{ env.ANDROID_HOME }}
          export ANDROID_NDK_HOME=${{ env.NDK_HOME }}
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cesia-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
