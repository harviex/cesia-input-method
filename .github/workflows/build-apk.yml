# Build APK for Android
# MNN .a libraries are downloaded from GitHub Release by CMake

name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android NDK
        run: |
          export SDK_ROOT=/usr/local/lib/android/sdk
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" > /dev/null 2>&1
          echo "NDK_HOME=$SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Download MNN libs from GitHub Release
        run: |
          # Download prebuilt MNN libs from release assets (avoid LFS quota)
          MNN_RELEASE_URL="https://github.com/harviex/cesia-input-method/releases/download/mnn-libs"
          JNI_DIR="ai-engine/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNI_DIR"
          for lib in libMNN.so libMNN_Express.so libc++_shared.so libMNN_CL.so libMNN_Vulkan.so libMNNAudio.so libMNNOpenCV.so libmnncore.so; do
            if [ ! -f "$JNI_DIR/$lib" ]; then
              echo "Downloading $lib..."
              curl -L -f -o "$JNI_DIR/$lib" "$MNN_RELEASE_URL/$lib" || echo "Warning: failed to download $lib"
            fi
          done
          ls -la "$JNI_DIR"

      - name: Restore debug keystore
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > /tmp/cesia-debug.keystore
          echo "Keystore restored"

      - name: Determine version
        id: version
        run: |
          # 版本号基于 git commit 数量自动递增（与本地 app/build.gradle 逻辑一致）
          # 格式：1.2.<gitCount>，保证覆盖安装且每次提交版本号自增
          GIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.2.${GIT_COUNT}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APK_VERSION=$VERSION" >> $GITHUB_ENV
          echo "apkVersion=$VERSION" > gradle.properties.tmp
          grep -v "^apkVersion=" gradle.properties >> gradle.properties.tmp 2>/dev/null || true
          mv gradle.properties.tmp gradle.properties
          echo "✅ Version: $VERSION"
      - name: Check if release tag exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag v${{ steps.version.outputs.version }} 已存在，跳过自动创建 Release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run lint
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          ./gradlew lintDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Run unit tests
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          ./gradlew testDebugUnitTest --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Build APK with Gradle
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export ANDROID_NDK_HOME=${{ env.NDK_HOME }}
          ./gradlew assembleDebug \
            --no-daemon \
            -PapkVersion=${{ steps.version.outputs.version }} \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cesia-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Cesia v${{ steps.version.outputs.version }}"
          body: |
            Cesia Input Method v${{ steps.version.outputs.version }}

            自动构建版本 — Git commit: ${{ github.sha }}

            **安装**: 下载 APK 直接安装覆盖旧版本，无需卸载重装。

            **变更**:
            ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json on gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const path = 'docs/latest.json';
            const content = JSON.stringify({
              apk_url: `https://github.com/harviex/cesia-input-method/releases/download/v${{ steps.version.outputs.version }}/Cesia-${{ steps.version.outputs.version }}-debug.apk`,
              version: `v${{ steps.version.outputs.version }}`
            });
            const { data: existing } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: 'gh-pages'
            });
            const sha = existing.sha;
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `chore: update latest.json to v${{ steps.version.outputs.version }}`,
              content: Buffer.from(content).toString('base64'),
              sha,
              branch: 'gh-pages'
            });
